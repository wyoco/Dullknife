<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tracking — New Job</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="icon" href="/static/favicon.ico">
    <style>
        .tk-container { max-width: 500px; margin: 0 auto; }
        .tk-card { background: white; border: 1px solid #ddd; border-radius: 8px; padding: 1.5rem; }
        .tk-card h1 { font-size: 1.3rem; color: #492e25; margin-bottom: 0.5rem; }
        .tk-card p { color: #888; font-size: 0.85rem; margin-bottom: 1.2rem; }
        .tk-card .form-group { margin-bottom: 1rem; }
        .tk-card label { display: block; font-weight: bold; margin-bottom: 0.3rem; font-size: 0.9rem; }
        .tk-card input[type="text"], .tk-card input[type="date"] { width: 100%; padding: 0.5rem; border: 1px solid #ccc; border-radius: 4px; font-size: 1rem; box-sizing: border-box; }
        .tk-buttons { display: flex; gap: 0.5rem; margin-top: 1.2rem; }
        .tk-btn { padding: 0.5rem 1.2rem; background: #492e25; color: white; border: none; border-radius: 4px; font-size: 0.9rem; cursor: pointer; text-decoration: none; display: inline-block; }
        .tk-btn:hover { background: #7c4e3f; }
        .tk-btn-cancel { background: #999; }
        .tk-btn-cancel:hover { background: #777; }
    </style>
</head>
<body>
    <header>
        <nav>
            <div class="logo"><a href="/"><img src="/static/images/jackRound.jpg" alt="Dullknife" class="nav-logo"></a></div>
            <ul>
                <li><a href="/tracking">Tracking</a></li>
                <li><a href="/tracking/logout">Logout</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <div class="tk-container">
            <div class="tk-card">
                <h1>New Job</h1>
                <p>Fill out Job Number, Start Date, and Contractor or Employee Name, then click Create. Click Cancel to go back to the Overview page.</p>

                <form method="post" action="/tracking/new">
                    <div class="form-group">
                        <label>Job Number</label>
                        <input type="text" name="job_number" required autofocus>
                    </div>
                    <div class="form-group">
                        <label>Start Date</label>
                        <input type="date" name="start_date" required>
                    </div>
                    <div class="form-group">
                        <label>Contractor or Employee Name</label>
                        <input type="text" name="identity_name" required>
                    </div>
                    <div class="tk-buttons">
                        <button type="submit" class="tk-btn">Create</button>
                        <a href="/tracking" class="tk-btn tk-btn-cancel">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </main>
    <footer><p>Enerflex Job Tracking</p></footer>
</body>
</html>
