<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Site Traffic Trends — Dullknife</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="icon" href="/static/favicon.ico">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
    <style>
        .trends-container { max-width: 950px; margin: 0 auto; }
        .trends-header { text-align: center; margin-bottom: 1.5rem; }
        .trends-header h1 { font-size: 1.6rem; color: #492e25; margin-bottom: 0.3rem; }
        .trends-header p { color: #888; font-size: 0.9rem; }
        .trends-controls { display: flex; justify-content: center; gap: 0.5rem; margin-bottom: 1.5rem; }
        .trends-btn { padding: 0.4rem 1rem; border: 1px solid #ccc; border-radius: 4px; background: white; cursor: pointer; font-size: 0.9rem; color: #492e25; text-decoration: none; }
        .trends-btn:hover { background: #f0e8e2; }
        .trends-btn.active { background: #492e25; color: white; border-color: #492e25; }
        .chart-wrap { background: white; border: 1px solid #ddd; border-radius: 8px; padding: 1.5rem; }
        .trends-legend { display: flex; justify-content: center; gap: 2rem; margin-top: 1rem; font-size: 0.85rem; }
        .legend-item { display: flex; align-items: center; gap: 0.4rem; }
        .legend-dot { width: 12px; height: 12px; border-radius: 50%; }
        .trends-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; margin-top: 1.5rem; }
        .stat-card { background: white; border: 1px solid #ddd; border-radius: 6px; padding: 1rem; text-align: center; }
        .stat-value { font-size: 1.8rem; font-weight: bold; }
        .stat-label { font-size: 0.8rem; color: #888; margin-top: 0.2rem; }
        .stat-hearit .stat-value { color: #e74c3c; }
        .stat-dullknife .stat-value { color: #3498db; }
        .stat-brandbook .stat-value { color: #2ecc71; }
        @media (max-width: 600px) {
            .trends-stats { grid-template-columns: 1fr; }
            .trends-controls { flex-wrap: wrap; }
        }
    </style>
</head>
<body>
    <header>
        <nav>
            <div class="logo"><a href="/"><img src="/static/images/jackRound.jpg" alt="Dullknife" class="nav-logo"></a></div>
            <ul>
                <li><a href="/directory">Member Directory</a></li>
                <li><a href="/brandbook">Brand Book</a></li>
                <li><a href="/trends">Trends</a></li>
                <li><a href="/about">About Us</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <div class="trends-container">
            <div class="trends-header">
                <h1>Site Traffic Trends</h1>
                <p>Page views per 4-hour window</p>
            </div>

            <div class="trends-controls">
                <a href="#" class="trends-btn" data-days="1" onclick="loadData(1)">24h</a>
                <a href="#" class="trends-btn active" data-days="7" onclick="loadData(7)">7 days</a>
                <a href="#" class="trends-btn" data-days="14" onclick="loadData(14)">14 days</a>
                <a href="#" class="trends-btn" data-days="30" onclick="loadData(30)">30 days</a>
                <a href="#" class="trends-btn" data-days="90" onclick="loadData(90)">90 days</a>
                <a href="#" class="trends-btn" data-days="365" onclick="loadData(365)">1 year</a>
            </div>

            <div class="chart-wrap">
                <canvas id="trendsChart" height="120"></canvas>
            </div>

            <div class="trends-stats">
                <div class="stat-card stat-hearit">
                    <div class="stat-value" id="stat-hearit">—</div>
                    <div class="stat-label">hearit.com views</div>
                </div>
                <div class="stat-card stat-dullknife">
                    <div class="stat-value" id="stat-dullknife">—</div>
                    <div class="stat-label">dullknife.com views</div>
                </div>
                <div class="stat-card stat-brandbook">
                    <div class="stat-value" id="stat-brandbook">—</div>
                    <div class="stat-label">brandbook views</div>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <p>Traffic data collected from Apache access logs.</p>
    </footer>

    <script>
        let chart = null;

        function loadData(days) {
            // Update active button
            document.querySelectorAll('.trends-btn').forEach(b => b.classList.remove('active'));
            document.querySelector(`[data-days="${days}"]`).classList.add('active');

            fetch(`/trends/data?days=${days}`)
                .then(r => r.json())
                .then(data => {
                    // Update stats
                    const hearitTotal = data.datasets[0].data.reduce((a, b) => a + b, 0);
                    const dullknifeTotal = data.datasets[1].data.reduce((a, b) => a + b, 0);
                    const brandbookTotal = data.datasets[2].data.reduce((a, b) => a + b, 0);

                    document.getElementById('stat-hearit').textContent = hearitTotal.toLocaleString();
                    document.getElementById('stat-dullknife').textContent = dullknifeTotal.toLocaleString();
                    document.getElementById('stat-brandbook').textContent = brandbookTotal.toLocaleString();

                    // Build chart
                    const ctx = document.getElementById('trendsChart').getContext('2d');

                    if (chart) chart.destroy();

                    chart = new Chart(ctx, {
                        type: 'line',
                        data: {
                            labels: data.labels,
                            datasets: data.datasets.map(ds => ({
                                label: ds.label,
                                data: ds.data,
                                borderColor: ds.borderColor,
                                backgroundColor: ds.backgroundColor,
                                borderWidth: 2,
                                tension: 0.3,
                                fill: true,
                                pointRadius: 3,
                                pointHoverRadius: 5,
                            }))
                        },
                        options: {
                            responsive: true,
                            interaction: {
                                mode: 'index',
                                intersect: false,
                            },
                            plugins: {
                                legend: {
                                    position: 'top',
                                    labels: { usePointStyle: true, padding: 20 }
                                },
                                tooltip: {
                                    callbacks: {
                                        title: function(items) {
                                            return items[0].label;
                                        },
                                        label: function(item) {
                                            return `${item.dataset.label}: ${item.raw} views`;
                                        }
                                    }
                                }
                            },
                            scales: {
                                x: {
                                    ticks: {
                                        maxRotation: 45,
                                        maxTicksLimit: 12,
                                        font: { size: 11 }
                                    },
                                    grid: { display: false }
                                },
                                y: {
                                    beginAtZero: true,
                                    ticks: {
                                        stepSize: 1,
                                        font: { size: 11 }
                                    },
                                    title: {
                                        display: true,
                                        text: 'Page Views',
                                        font: { size: 12 }
                                    }
                                }
                            }
                        }
                    });
                });
        }

        // Load 7-day view on page load
        loadData(7);
    </script>
</body>
</html>
