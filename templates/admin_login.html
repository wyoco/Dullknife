<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dullknife - Administration Login</title>
        <meta name="robots" content="noindex, nofollow">
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="icon" href="/static/favicon.ico">
    <script src="https://www.google.com/recaptcha/api.js" async defer></script>
    <script>function onSubmit(token) { document.getElementById('admin-login-form').submit(); }</script>
</head>
<body>
    <header>
        <nav>
            <div class="logo"><a href="/"><img src="/static/images/jackRound.jpg" alt="Dullknife" class="nav-logo"></a></div>
            <ul>
                <li><a href="/">Home</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <h1>Administration Login</h1>
        {% if error %}
        <p class="error">{{ error }}</p>
        {% endif %}
        {% if warning %}
        <p class="warning">{{ warning }}</p>
        {% endif %}
        <form method="post" action="/admin/login" id="admin-login-form">
            <div class="form-group">
                <label>Username *</label>
                <input type="text" name="username" required autofocus>
            </div>
            <div class="form-group">
                <label>Password *</label>
                <input type="password" name="password" required>
            </div>
            <div class="form-buttons">
                <button class="g-recaptcha" data-sitekey="6Lfd75osAAAAACKzI8-JUWRGaYV4L3ejVBZMIeyN" data-callback="onSubmit">Login</button>
                <a href="/" class="button">Cancel</a>
            </div>
        </form>
    </main>
    <footer>
        <p>&copy; 2026 Dullknife</p>
    </footer>
</body>
</html>
