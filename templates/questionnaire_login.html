<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Questionnaire Login</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="icon" href="/static/favicon.ico">
</head>
<body>
    <header>
        <nav>
            <div class="logo"><a href="/"><img src="/static/images/jackRound.jpg" alt="Dullknife" class="nav-logo"></a></div>
            <ul>
                <li><a href="/directory">Member Directory</a></li>
                <li><a href="/about">About Us</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <h1>Questionnaire Login</h1>

        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}

        <form method="post" action="/questionnaire/login" style="max-width: 400px;">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" name="username" id="username" required autofocus>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" name="password" id="password" required>
            </div>
            <input type="hidden" name="next" value="{{ next or '' }}">
            <div class="form-actions" style="margin-top: 1.5rem;">
                <button type="submit" class="button">Login</button>
            </div>
        </form>
    </main>

    <footer>
        <p>&copy; 2026 Dullknife</p>
    </footer>
</body>
</html>
