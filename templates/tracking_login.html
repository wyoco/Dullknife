<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tracking — Login</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="icon" href="/static/favicon.ico">
    <style>
        .tk-login { max-width: 360px; margin: 3rem auto; background: white; border: 1px solid #ddd; border-radius: 8px; padding: 2rem; }
        .tk-login h1 { font-size: 1.3rem; color: #492e25; margin-bottom: 1.2rem; text-align: center; }
        .tk-login .form-group { margin-bottom: 1rem; }
        .tk-login label { display: block; font-weight: bold; margin-bottom: 0.3rem; font-size: 0.9rem; }
        .tk-login input[type="text"], .tk-login input[type="password"] { width: 100%; padding: 0.5rem; border: 1px solid #ccc; border-radius: 4px; font-size: 1rem; box-sizing: border-box; }
        .tk-login button { width: 100%; padding: 0.6rem; background: #492e25; color: white; border: none; border-radius: 4px; font-size: 1rem; cursor: pointer; }
        .tk-login button:hover { background: #7c4e3f; }
        .tk-error { color: #c00; text-align: center; margin-bottom: 1rem; font-size: 0.9rem; }
    </style>
</head>
<body>
    <header>
        <nav>
            <div class="logo"><a href="/"><img src="/static/images/jackRound.jpg" alt="Dullknife" class="nav-logo"></a></div>
            <ul>
                <li><a href="/tracking/login">Tracking Login</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <div class="tk-login">
            <h1>Contractor & Employee Tracking</h1>
            {% if error %}
            <div class="tk-error">{{ error }}</div>
            {% endif %}
            <form method="post" action="/tracking/login">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" name="username" required autofocus>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" name="password" required>
                </div>
                <button type="submit">Log In</button>
            </form>
        </div>
    </main>
    <footer><p>Enerflex Job Tracking</p></footer>
</body>
</html>
